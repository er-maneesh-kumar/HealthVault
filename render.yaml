services:
  - type: web
    name: doc-plus-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: MONGO
        sync: false
      - key: PORT
        value: 8000

  - type: web
    name: doc-plus-frontend
    env: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: ./build
    envVars:
      - key: REACT_APP_API_BASE
        value: https://doc-plus-backend.onrender.com
      - key: REACT_APP_GOOGLE_CLIENT_ID
        value: 586871474912-b5cilus48nigm9fketorat64p9h431tn.apps.googleusercontent.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
